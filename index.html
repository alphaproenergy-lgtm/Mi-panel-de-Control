<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encabezado Dinámico Interactivo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: transparent !important;
        }

        #header-dinamico {
            padding: 24px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb); 
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        /* 3. SALUDO CON NOMBRE */
        #saludo-fecha {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #37352f;
        }

        /* 1 & 2. FRASE DINÁMICA CON COLOR PERSONALIZABLE */
        #frase {
            font-style: italic;
            color: #ff6b00; /* Color por defecto */
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }

        /* MENÚ DE AJUSTES INTERACTIVO */
        #config-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        #config-toggle:hover { opacity: 1; }

        #panel-ajustes {
            display: none; /* Oculto por defecto para mantener limpio Notion */
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .seccion-ajuste {
            margin-bottom: 12px;
        }

        .seccion-ajuste label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 4px;
        }

        .nota-gris {
            font-size: 0.75em;
            color: #9ca3af;
            font-style: italic;
            margin-top: 2px;
        }

        /* INPUTS Y BOTONES */
        input[type="text"] {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9em;
            color: #37352f;
        }

        .grupo-botones {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            background-color: #ffffff;
            color: #4b5563;
            border: 1px solid #d1d5db;
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:hover {
            background-color: #f9fafb;
            color: #1f2937;
            border-color: #9ca3af;
        }

        /* Selector de color nativo estilizado */
        input[type="color"] {
            border: none;
            width: 40px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }
    </style>
</head>
<body>

    <div id="header-dinamico">
        <!-- Icono de engranaje para abrir configuraciones -->
        <button id="config-toggle" onclick="toggleAjustes()" title="Personalizar panel">⚙️</button>

        <div id="saludo-fecha">
            <span id="saludo"></span> <span id="nombre-usuario"></span>, hoy es <span id="fecha"></span>
        </div>
        
        <div id="frase"></div>

        <!-- PANEL DE CONTROL INTERACTIVO -->
        <div id="panel-ajustes">
            <!-- 3. CONFIGURACIÓN DEL NOMBRE -->
            <div class="seccion-ajuste">
                <label for="input-nombre">Nombre o Apodo</label>
                <input type="text" id="input-nombre" placeholder="Ej. Juan José o Misterio" oninput="guardarNombre()">
                <div class="nota-gris">Ingresa nombre o apodo (si lo desea).</div>
            </div>

            <!-- 1. EDIT COLOR FRASE -->
            <div class="seccion-ajuste" style="display: flex; align-items: center; gap: 10px;">
                <label style="margin-bottom: 0;">Edit color frase:</label>
                <input type="color" id="selector-color" value="#ff6b00" onchange="cambiarColorFrase(this.value)">
            </div>

            <!-- 2. CAMBIAR FRASE -->
            <div class="grupo-botones">
                <button class="btn" onclick="cambiarFrase()">🔄 Cambiar frase</button>
                <button class="btn" style="margin-left: auto; background-color: #f3f4f6;" onclick="toggleAjustes()">Listo</button>
            </div>
        </div>
    </div>

    <script>
        const frases = [
            "El único modo de hacer un gran trabajo es amar lo que haces.",
            "Haz de hoy tu obra maestra.",
            "Tu productividad es el resultado de tu enfoque.",
            "Pequeños pasos todos los días conducen a grandes resultados."
        ];

        function inicializarHeader() {
            // 1. Configurar Saludo según la hora
            const ahora = new Date();
            const hora = ahora.getHours();
            let saludo = "¡Hola!";

            if (hora >= 6 && hora < 12) saludo = "🌅 ¡Buenos días!,";
            else if (hora >= 12 && hora < 20) saludo = "☀️ ¡Buenas tardes!,";
            else saludo = "🌙 ¡Buenas noches!,";
            document.getElementById("saludo").innerText = saludo;

            // 2. Configurar Fecha actualizada
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById("fecha").innerText = ahora.toLocaleDateString('es-ES', opciones);

            // 3. Cargar datos persistentes (Local Storage) para que Notion recuerde el nombre y color escogido
            const nombreGuardado = localStorage.getItem('usuario-nombre') || "";
            document.getElementById('input-nombre').value = nombreGuardado;
            actualizarVisualizacionNombre(nombreGuardado);

            const colorGuardado = localStorage.getItem('usuario-color-frase') || "#ff6b00";
            document.getElementById('selector-color').value = colorGuardado;
            cambiarColorFrase(colorGuardado);

            // Cargar frase inicial aleatoria
            cambiarFrase();
        }

        // Intercambiar visibilidad del panel de herramientas
        function toggleAjustes() {
            const panel = document.getElementById('panel-ajustes');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        // Lógica para el botón de cambio de frase
        function cambiarFrase() {
            const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
            document.getElementById("frase").innerText = `"${fraseAleatoria}"`;
        }

        // Lógica para cambiar y guardar el color de la frase
        function cambiarColorFrase(nuevoColor) {
            document.getElementById('frase').style.color = nuevoColor;
            localStorage.setItem('usuario-color-frase', nuevoColor);
        }

        // Lógica para guardar el nombre de usuario de forma local
        function guardarNombre() {
            const nombre = document.getElementById('input-nombre').value;
            localStorage.setItem('usuario-nombre', nombre);
            actualizarVisualizacionNombre(nombre);
        }

        function actualizarVisualizacionNombre(nombre) {
            const contenedorNombre = document.getElementById('nombre-usuario');
            if(nombre.trim() !== "") {
                contenedorNombre.innerText = nombre;
                contenedorNombre.style.display = "inline";
            } else {
                contenedorNombre.style.display = "none"; // Si está vacío, no rompe la gramática
            }
        }

        // Arrancar el script de inmediato
        inicializarHeader();
    </script>
</body>
</html>
