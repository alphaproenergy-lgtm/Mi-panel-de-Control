<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encabezado Dinámico Interactivo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: transparent !important;
        }

        #header-dinamico {
            padding: 24px;
            border-radius: 8px;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb); 
            text-align: center;
            box-sizing: border-box;
            position: relative;
            transition: background 0.4s ease;
        }

        #saludo-fecha {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #37352f;
            transition: color 0.3s ease;
            line-height: 1.4;
        }

        #frase {
            font-style: italic;
            color: #ff6b00; 
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 24px;
            transition: color 0.3s ease;
        }

        #config-toggle {
            position: absolute;
            bottom: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 1.25em;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            z-index: 10;
        }
        #config-toggle:hover { opacity: 1; }

        #panel-ajustes {
            display: none; 
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .seccion-ajuste {
            margin-bottom: 12px;
        }

        .seccion-ajuste label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 4px;
        }

        .nota-gris {
            font-size: 0.75em;
            color: #9ca3af;
            font-style: italic;
            margin-top: 2px;
        }

        input[type="text"] {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.9em;
            color: #37352f;
        }

        .grupo-botones {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            background-color: #ffffff;
            color: #4b5563;
            border: 1px solid #d1d5db;
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:hover {
            background-color: #f9fafb;
            color: #1f2937;
            border-color: #9ca3af;
        }

        .control-color {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        input[type="color"] {
            border: none;
            width: 40px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }

        select {
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #d1d5db;
            color: #37352f;
            font-size: 0.85em;
        }
    </style>
</head>
<body>

    <div id="header-dinamico">
        <!-- BLOQUE DE SALUDO OPTIMIZADO -->
        <div id="saludo-fecha">
            <span id="texto-saludo-completo"></span>
        </div>
        
        <div id="frase"></div>

        <button id="config-toggle" onclick="toggleAjustes()" title="Personalizar panel">⚙️</button>

        <!-- PANEL DE CONTROL INTERACTIVO -->
        <div id="panel-ajustes">
            <div class="seccion-ajuste">
                <label for="input-nombre">Nombre o Apodo</label>
                <input type="text" id="input-nombre" placeholder="Ej. Juan José o Misterio" oninput="guardarNombre()">
                <div class="nota-gris">Ingresa nombre o apodo (si lo desea).</div>
            </div>

            <div class="seccion-ajuste control-color">
                <label style="margin-bottom: 0;">Edit color frase:</label>
                <input type="color" id="selector-color" value="#ff6b00" onchange="cambiarColorFrase(this.value)">
            </div>

            <div class="seccion-ajuste">
                <label>Fondo de la ventana:</label>
                <div class="control-color" style="margin-top: 4px;">
                    <select id="selector-tipo-fondo" onchange="actualizarOpcionesFondo()">
                        <option value="gradiente">Gradiente Gris (Default)</option>
                        <option value="solido">Color Sólido</option>
                        <option value="oscuro">Estilo Modo Oscuro</option>
                    </select>
                    <input type="color" id="selector-color-fondo" value="#f3f4f6" onchange="cambiarColorFondoSolido(this.value)" style="display:none;">
                </div>
            </div>

            <div class="grupo-botones">
                <button class="btn" onclick="cambiarFrase()">🔄 Cambiar frase</button>
                <button class="btn" style="margin-left: auto; background-color: #f3f4f6;" onclick="toggleAjustes()">Listo</button>
            </div>
        </div>
    </div>

    <script>
        const frases = [
            "El único modo de hacer un gran trabajo es amar lo que haces.",
            "Haz de hoy tu obra maestra.",
            "Tu productividad es el resultado de tu enfoque.",
            "Pequeños pasos todos los días conducen a grandes resultados."
        ];

        // Función para poner en mayúscula la primera letra de una palabra
        function capitalizar(cadena) {
            return cadena.charAt(0).toUpperCase() + cadena.slice(1);
        }

        function construirSaludo() {
            const ahora = new Date();
            const hora = ahora.getHours();
            const nombreGuardado = localStorage.getItem('usuario-nombre') || "";
            
            // 1. Definición del saludo base según la hora
            let saludoBase = "";
            if (hora >= 6 && hora < 12) {
                saludoBase = "🌅 ¡Buenos días!";
            } else if (hora >= 12 && hora < 20) {
                saludoBase = "☀️ ¡Buenas tardes!";
            } else {
                saludoBase = "🌙 ¡Buenas noches!";
            }

            // 2. Formatear la fecha con mayúsculas estilizadas
            const opcionesDia = { weekday: 'long' };
            const opcionesMes = { month: 'long', day: 'numeric', year: 'numeric' };
            
            const diaSemana = capitalizar(ahora.toLocaleDateString('es-ES', opcionesDia));
            const restoFecha = ahora.toLocaleDateString('es-ES', opcionesMes);
            const fechaFormateada = `${diaSemana}, ${restoFecha}`;

            // 3. Ensamblar la frase con la gramática correcta
            let saludoCompleto = "";
            if (nombreGuardado.trim() !== "") {
                saludoCompleto = `${saludoBase} ${nombreGuardado.trim()}, hoy es ${fechaFormateada}.`;
            } else {
                saludoCompleto = `${saludoBase} hoy es ${fechaFormateada}.`;
            }

            document.getElementById("texto-saludo-completo").innerText = saludoCompleto;
        }

        function inicializarHeader() {
            // Cargar datos del Nombre
            const nombreGuardado = localStorage.getItem('usuario-nombre') || "";
            document.getElementById('input-nombre').value = nombreGuardado;

            // Cargar Color de Frase
            const colorGuardado = localStorage.getItem('usuario-color-frase') || "#ff6b00";
            document.getElementById('selector-color').value = colorGuardado;
            cambiarColorFrase(colorGuardado);

            // Cargar Tipo de Fondo
            const tipoFondoGuardado = localStorage.getItem('usuario-tipo-fondo') || "gradiente";
            document.getElementById('selector-tipo-fondo').value = tipoFondoGuardado;
            
            const colorFondoGuardado = localStorage.getItem('usuario-color-fondo') || "#f3f4f6";
            document.getElementById('selector-color-fondo').value = colorFondoGuardado;
            
            aplicarFondo(tipoFondoGuardado, colorFondoGuardado);
            actualizarOpcionesFondo();

            // Construir la oración del saludo
            construirSaludo();
            cambiarFrase();
        }

        function toggleAjustes() {
            const panel = document.getElementById('panel-ajustes');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function cambiarFrase() {
            const fraseAleatoria = frases[Math.floor(Math.random() * frases.length)];
            document.getElementById("frase").innerText = `"${fraseAleatoria}"`;
        }

        function cambiarColorFrase(nuevoColor) {
            document.getElementById('frase').style.color = nuevoColor;
            localStorage.setItem('usuario-color-frase', nuevoColor);
        }

        function guardarNombre() {
            const nombre = document.getElementById('input-nombre').value;
            localStorage.setItem('usuario-nombre', nombre);
            construirSaludo(); // Reconstruye la oración inmediatamente mientras escribes
        }

        function actualizarOpcionesFondo() {
            const tipo = document.getElementById('selector-tipo-fondo').value;
            const selectorColor = document.getElementById('selector-color-fondo');
            
            if (tipo === 'solido') {
                selectorColor.style.display = 'inline-block';
            } else {
                selectorColor.style.display = 'none';
            }
            
            localStorage.setItem('usuario-tipo-fondo', tipo);
            aplicarFondo(tipo, selectorColor.value);
        }

        function cambiarColorFondoSolido(color) {
            localStorage.setItem('usuario-color-fondo', color);
            aplicarFondo('solido', color);
        }

        function aplicarFondo(tipo, colorSolido) {
            const contenedor = document.getElementById('header-dinamico');
            const textoSaludo = document.getElementById('saludo-fecha');

            if (tipo === 'gradiente') {
                contenedor.style.background = "linear-gradient(135deg, #f3f4f6, #e5e7eb)";
                textoSaludo.style.color = "#37352f";
            } else if (tipo === 'solido') {
                contenedor.style.background = colorSolido;
                textoSaludo.style.color = "#37352f";
            } else if (tipo === 'oscuro') {
                contenedor.style.background = "#202020"; 
                textoSaludo.style.color = "#ffffff"; 
            }
        }

        inicializarHeader();
    </script>
</body>
</html>
